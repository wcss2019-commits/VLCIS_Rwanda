name: Hourly Data Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-fuse:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run data quality control
        run: python scripts/quality_control.py
      
      - name: Run AI data fusion
        run: python scripts/run_data_fusion.py
      
      - name: Generate alerts
        run: python scripts/generate_alerts.py
